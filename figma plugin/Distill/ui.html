<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #fff;
      --border: #e4e4e4;
      --text: #222;
      --muted: #6f6f6f;
      --brand: #18a0fb;
      --danger: #d92d20;
      --warn: #b54708;
      --ok: #14833b;
      --soft: #f7f7f7;
      font: 12px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    #plugin-root { width: 420px; box-sizing: border-box; }
    .toolbar, .footer { display: flex; gap: 8px; padding: 12px; border-bottom: 1px solid var(--border); }
    .footer { border-top: 1px solid var(--border); border-bottom: 0; justify-content: space-between; }
    .content { padding: 12px; display: grid; gap: 12px; }
    button, select, input {
      font: inherit;
      height: 30px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      box-sizing: border-box;
    }
    button { padding: 0 10px; background: var(--brand); border-color: var(--brand); color: white; font-weight: 600; }
    button.secondary { background: #fff; color: var(--text); border-color: var(--border); }
    button:disabled { background: #d9d9d9; border-color: #d9d9d9; color: #777; }
    button.loading {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      box-sizing: border-box;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    select { min-width: 86px; padding: 0 8px; }
    input { width: 100%; padding: 0 8px; }
    .status {
      padding: 14px 12px;
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      gap: 12px;
    }
    .status-title { font-size: 16px; font-weight: 800; }
    .status-meta { color: var(--muted); line-height: 1.45; }
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .library-column { display: grid; gap: 8px; min-width: 0; }
    .library-heading {
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }
    .library-row {
      color: var(--muted);
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .group-tabs {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      padding: 2px 0 0;
      scrollbar-width: none;
    }
    .group-tabs::-webkit-scrollbar { display: none; }
    .group-tab {
      position: relative;
      flex: 0 0 auto;
      height: 34px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #9a9a9a;
      font-size: 16px;
      font-weight: 800;
    }
    .group-tab:disabled {
      background: transparent;
      border-color: transparent;
      color: #9a9a9a;
    }
    .group-tab.active {
      color: var(--text);
    }
    .group-tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -2px;
      height: 4px;
      border-radius: 999px;
      background: var(--brand);
    }
    .tab-count {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      margin-left: 4px;
    }
    .group-panel { display: grid; gap: 10px; }
    .group {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .group-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--soft);
    }
    .group-title { font-weight: 700; }
    .counts { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .list { display: grid; }
    .empty { padding: 12px; color: var(--muted); }
    .item {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }
    .item:first-child { border-top: 0; }
    .badge {
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      background: #eee;
      color: #555;
    }
    .badge.new { background: #e8f4ff; color: #0969a8; }
    .badge.match, .badge.applied { background: #e8f8ee; color: var(--ok); }
    .badge.conflict, .badge.invalid { background: #fff0ee; color: var(--danger); }
    .badge.skip { background: #fff6e8; color: var(--warn); }
    .item-body { display: grid; gap: 6px; min-width: 0; }
    .item-meta { color: var(--muted); font-size: 11px; overflow-wrap: anywhere; }
    .item-reason { color: var(--danger); font-size: 11px; }
    .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 3px; border: 1px solid rgba(0,0,0,.12); vertical-align: -1px; margin-right: 4px; }
    .group-action { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
    .export-row { display: flex; gap: 8px; align-items: center; }
    .export-row select { flex: 1; }
  </style>
</head>
<body>
  <div id="plugin-root">
    <div class="toolbar">
      <button id="action-audit" class="secondary" type="button">检测设计库</button>
      <button id="action-preview" type="button">提取候选</button>
    </div>
    <div class="content">
      <section class="status">
        <div class="status-title" id="status-title">等待检测</div>
        <div class="status-meta" id="status-meta">先检测当前文件和已启用团队库，再从选中 Frame 提取候选 token。</div>
      </section>
      <div id="groups"></div>
    </div>
    <div class="footer">
      <div class="export-row">
        <select id="export-format" aria-label="导出格式">
          <option value="JSON" selected>JSON</option>
          <option value="CSS">CSS</option>
        </select>
        <button id="action-export" class="secondary" type="button">导出</button>
      </div>
    </div>
  </div>
  <script>
    const groupLabels = { colors: 'Colors', typography: 'Typography', radius: 'Radius' }
    const statusLabels = { match: '匹配', new: '新增', conflict: '冲突', invalid: '无效', skip: '跳过', applied: '已提交' }
    const groupOrder = ['colors', 'typography', 'radius']
    const minLoadingMs = 350
    let latestState = { isExecuting: false, activeAction: null, hasSelection: false, audit: null, proposal: null }
    let activeGroup = 'colors'
    let lastReportedHeight = 0
    let resizeRaf = 0
    let loadingStartedAt = 0
    let pendingStateTimer = 0

    function send(message) {
      parent.postMessage({ pluginMessage: message }, '*')
    }
    function sendWithLoading(message, action) {
      if (pendingStateTimer) clearTimeout(pendingStateTimer)
      loadingStartedAt = Date.now()
      latestState = { ...latestState, isExecuting: true, activeAction: action }
      render()
      parent.postMessage({ pluginMessage: message }, '*')
    }
    function measurePanelHeight() {
      const root = document.getElementById('plugin-root')
      return root ? Math.ceil(root.getBoundingClientRect().height) : 0
    }
    function reportHeight() {
      const h = measurePanelHeight()
      if (h && h !== lastReportedHeight) {
        lastReportedHeight = h
        send({ type: 'resize', height: h })
      }
    }
    function scheduleResize() {
      if (resizeRaf) cancelAnimationFrame(resizeRaf)
      resizeRaf = requestAnimationFrame(reportHeight)
    }
    function formatCounts(summary) {
      if (!summary) return '匹配 0 · 新增 0 · 冲突 0'
      return `匹配 ${summary.match || 0} · 新增 ${summary.new || 0} · 冲突 ${(summary.conflict || 0) + (summary.invalid || 0)} · 已提交 ${summary.applied || 0}`
    }
    function formatTabCount(summary) {
      if (!summary) return '0'
      return `${(summary.new || 0) + (summary.match || 0)}/${(summary.conflict || 0) + (summary.invalid || 0)}`
    }
    function describeCandidate(item) {
      if (item.group === 'colors') return `${item.hex} · ${item.refs.length} 处引用`
      if (item.group === 'typography') return `${item.fontFamily} ${item.fontSize}px ${item.fontStyle} · ${item.refs.length} 处引用`
      return `${item.value}px · ${item.refs.length} 处引用`
    }
    function colorSwatch(item) {
      if (item.group !== 'colors') return ''
      return `<span class="swatch" style="background:${item.hex}"></span>`
    }
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]))
    }
    function remoteVariableDetail(total, available, bound) {
      const parts = []
      if (available) parts.push(`可访问库 ${available}`)
      if (bound) parts.push(`已绑定 ${bound}`)
      return parts.length ? `${total || 0}（${parts.join(' / ')}）` : `${total || 0}`
    }
    function setButtonLoading(button, isLoading, loadingText) {
      if (!button) return
      if (!button.dataset.label) button.dataset.label = button.textContent
      button.classList.toggle('loading', Boolean(isLoading))
      button.innerHTML = isLoading ? `<span class="spinner" aria-hidden="true"></span><span>${loadingText}</span>` : button.dataset.label
    }
    function renderStatus() {
      const audit = latestState.audit
      const title = document.getElementById('status-title')
      const meta = document.getElementById('status-meta')
      if (!audit) {
        title.textContent = '等待检测'
        meta.textContent = latestState.hasSelection ? '已选中 Frame。点击「检测设计库」后再提取候选。' : '请先选中至少一个 Frame。'
        return
      }
      const hasLibrary = audit.hasLocalLibrary || audit.hasRemoteLibrary
      title.textContent = hasLibrary ? '已发现现有设计库' : '未发现现有设计库'
      const remoteNames = Array.isArray(audit.remoteLibraryNames) && audit.remoteLibraryNames.length
        ? audit.remoteLibraryNames.map(escapeHtml).join(' / ')
        : '未命名引用库'
      meta.innerHTML = `<div class="status-grid">
        <div class="library-column">
          <div class="library-heading">本地组件库</div>
          <div class="library-row">本地颜色变量 ${audit.localColorVariables || 0}</div>
          <div class="library-row">本地文字变量 ${audit.localTypographyVariables || 0}</div>
          <div class="library-row">本地组件/实例 ${audit.localComponents || 0}</div>
        </div>
        <div class="library-column">
          <div class="library-heading">引用组件库（${remoteNames}）</div>
          <div class="library-row">远程颜色变量 ${remoteVariableDetail(audit.remoteColorVariables, audit.remoteAvailableColorVariables, audit.remoteBoundColorVariables)}</div>
          <div class="library-row">远程文字变量 ${remoteVariableDetail(audit.remoteTypographyVariables, audit.remoteAvailableTypographyVariables, audit.remoteBoundTypographyVariables)}</div>
          <div class="library-row">远程组件/实例 ${audit.remoteComponents || 0}</div>
          <div class="library-row">远程样式 ${audit.remoteStyles || 0}</div>
        </div>
      </div>`
    }
    function renderGroups() {
      const host = document.getElementById('groups')
      const proposal = latestState.proposal
      if (!proposal) {
        host.innerHTML = '<section class="group"><div class="empty">暂无候选。点击「提取候选」后，会在这里重命名新增 token 并按组提交。</div></section>'
        return
      }
      if (!proposal.groups[activeGroup]) activeGroup = 'colors'
      const group = activeGroup
      const items = proposal.groups[group] || []
      const summary = proposal.summaries[group]
      const rows = items.length ? items.map(item => {
        const editable = item.status === 'new' || item.status === 'invalid'
        const input = editable
          ? `<input data-group="${group}" data-id="${item.id}" value="${item.targetName.replace(/"/g, '&quot;')}" aria-label="token name">`
          : `<div class="item-meta">${item.targetName}</div>`
        return `<div class="item">
          <div><span class="badge ${item.status}">${statusLabels[item.status]}</span></div>
          <div class="item-body">
            ${input}
            <div class="item-meta">${colorSwatch(item)}${describeCandidate(item)}</div>
            ${item.reason ? `<div class="item-reason">${item.reason}</div>` : ''}
          </div>
        </div>`
      }).join('') : '<div class="empty">没有候选项</div>'
      const canApply = items.some(item => item.status === 'new' || item.status === 'match')
      const isApplying = latestState.activeAction === `apply-${group}`
      const tabs = groupOrder.map(tabGroup => {
        const active = tabGroup === group
        return `<button class="group-tab ${active ? 'active' : ''}" data-tab="${tabGroup}" type="button" ${latestState.isExecuting ? 'disabled' : ''}>${groupLabels[tabGroup]}<span class="tab-count">${formatTabCount(proposal.summaries[tabGroup])}</span></button>`
      }).join('')
      host.innerHTML = `<div class="group-panel">
        <div class="group-tabs" role="tablist">${tabs}</div>
        <section class="group">
          <div class="group-head">
            <div class="group-title">${groupLabels[group]}</div>
            <div class="counts">${formatCounts(summary)}</div>
          </div>
          <div class="list">${rows}</div>
          <div class="group-action"><button data-apply="${group}" type="button" class="${isApplying ? 'loading' : ''}" ${canApply && !latestState.isExecuting ? '' : 'disabled'}>${isApplying ? '<span class="spinner" aria-hidden="true"></span><span>添加中</span>' : `添加 ${groupLabels[group]} 并绑定`}</button></div>
        </section>
      </div>`
      host.querySelectorAll('button[data-tab]').forEach(button => {
        button.addEventListener('click', () => {
          activeGroup = button.dataset.tab || 'colors'
          render()
        })
      })
      host.querySelectorAll('input[data-group]').forEach(input => {
        input.addEventListener('change', () => send({ type: 'rename-token', group: input.dataset.group, id: input.dataset.id, targetName: input.value }))
        input.addEventListener('blur', () => send({ type: 'rename-token', group: input.dataset.group, id: input.dataset.id, targetName: input.value }))
      })
      host.querySelectorAll('button[data-apply]').forEach(button => {
        button.addEventListener('click', () => {
          const group = button.dataset.apply
          sendWithLoading({ type: 'apply-group', group }, `apply-${group}`)
        })
      })
    }
    function render() {
      const auditButton = document.getElementById('action-audit')
      const previewButton = document.getElementById('action-preview')
      const exportButton = document.getElementById('action-export')
      auditButton.disabled = latestState.isExecuting
      previewButton.disabled = latestState.isExecuting || !latestState.hasSelection
      exportButton.disabled = latestState.isExecuting
      setButtonLoading(auditButton, latestState.activeAction === 'audit', '检测中')
      setButtonLoading(previewButton, latestState.activeAction === 'preview', '提取中')
      setButtonLoading(exportButton, latestState.activeAction === 'export', '导出中')
      renderStatus()
      renderGroups()
      scheduleResize()
    }

    document.getElementById('action-audit').addEventListener('click', () => sendWithLoading({ type: 'audit' }, 'audit'))
    document.getElementById('action-preview').addEventListener('click', () => sendWithLoading({ type: 'extract-preview' }, 'preview'))
    document.getElementById('action-export').addEventListener('click', () => {
      const fmt = String(document.getElementById('export-format').value || 'JSON').toLowerCase()
      sendWithLoading({ type: 'export', format: fmt === 'css' ? 'css' : 'json' }, 'export')
    })
    window.addEventListener('message', event => {
      const msg = event.data && event.data.pluginMessage
      if (!msg) return
      if (msg.type === 'state') {
        if (pendingStateTimer) clearTimeout(pendingStateTimer)
        const loadingElapsed = Date.now() - loadingStartedAt
        const shouldHoldLoading = latestState.isExecuting && latestState.activeAction && !msg.isExecuting && loadingElapsed < minLoadingMs
        if (shouldHoldLoading) {
          pendingStateTimer = setTimeout(() => {
            pendingStateTimer = 0
            latestState = msg
            render()
          }, minLoadingMs - loadingElapsed)
          return
        }
        latestState = msg
        render()
        return
      }
      if (msg.type === 'download') {
        const ext = msg.format === 'css' ? 'css' : 'json'
        const blob = new Blob([msg.content], { type: msg.format === 'css' ? 'text/css' : 'application/json' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = 'tokens.' + ext
        document.body.appendChild(a)
        a.click()
        document.body.removeChild(a)
        URL.revokeObjectURL(url)
      }
    })
    if (typeof ResizeObserver !== 'undefined') new ResizeObserver(scheduleResize).observe(document.getElementById('plugin-root'))
    new MutationObserver(scheduleResize).observe(document.body, { childList: true, subtree: true, attributes: true })
    render()
  </script>
</body>
</html>
